<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>岩石採集記録</title>

<script src="https://unpkg.com/alpinejs" defer></script>

<style>
  body {
    font-family: sans-serif;
    padding: 12px;
    background:#ddd;
    font-size: 16px;
  }

  h1 {
    margin-bottom: 12px;
    font-size: 20px;
  }

  .group-title {
    font-size: 14px;
    margin-top: 10px;
    color: #555;
  }

  .btns {
    margin-top: 6px;
  }

  .btn {
    display:inline-block;
    padding:6px 12px;
    margin:4px;
    border-radius:20px;
    border:1px solid #ccc;
    background:#fff;
    cursor:pointer;
    font-size:14px;
  }

  .btn.active {
    background:#333;
    color:#fff;
    border-color:#333;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 10px;
  }

  @media (max-width: 480px) {
    .grid {
      grid-template-columns: 1fr;
    }
  }

  .card {
    background:#fff;
    border-radius:10px;
    padding:10px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
    cursor:pointer;
  }

  img {
    width:100%;
    border-radius:6px;
  }

  .meta {
    font-size:14px;
    color:#444;
  }

  .date {
    font-size:12px;
    color:#999;
  }

  .modal {
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.85);
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .modal-inner {
    background:#fff;
    padding:10px;
    border-radius:10px;
    max-width:95%;
  }

  .modal img {
    max-height:55vh;
    margin:4px;
  }

  .thumbs img {
    width:70px;
    cursor:pointer;
    opacity:0.6;
  }

  .thumbs img.active {
    opacity:1;
    border:2px solid #333;
  }

  /* 🔍 ルーペ（追加分） */
  .zoom-container {
    position: relative;
  }

  .zoom-lens {
    position: absolute;
    width: 200px;
    height: 200px;
    border: 2px solid #333;
    border-radius: 50%;
    pointer-events: none;
    display: none;
    background-repeat: no-repeat;
    background-size: 300%;
    z-index: 10;
  }
</style>
</head>

<body x-data="stonesApp()">

<h1>🪨 岩石採集記録</h1>

<!-- フィルタ -->
<div>

  <div class="group-title">都道府県</div>
  <div class="btns">
    <template x-for="pref in prefectures()" :key="pref">
      <span
        class="btn"
        :class="{active: selectedPrefs.includes(pref)}"
        @click="togglePref(pref)"
        x-text="pref">
      </span>
    </template>
  </div>

  <div class="group-title">タグ</div>
  <div class="btns">
    <template x-for="tag in tags()" :key="tag">
      <span
        class="btn"
        :class="{active: selectedTags.includes(tag)}"
        @click="toggleTag(tag)"
        x-text="tag">
      </span>
    </template>
  </div>

</div>

<!-- カード -->
<div class="grid">
  <template x-for="stone in filtered()" :key="stone.id">
    <div class="card" @click="open(stone)">
      <img :src="stone.images[0]">

      <div class="date">
        #<span x-text="stone.id"></span><br>
        <span x-text="stone.prefecture"></span>
        <span x-text="stone.location"></span>
      </div>

      <div class="meta" x-text="stone.tag"></div>
      <div class="date" x-text="stone.date"></div>
    </div>
  </template>
</div>

<!-- モーダル -->
<div class="modal" x-show="selected" @click="selected=null">
  <div class="modal-inner" @click.stop>

    <!-- 🔍 ここだけ差し替え（元のimg→ラップ） -->
    <div class="zoom-container"
         @mousemove="zoomMove($event)"
         @mouseenter="zoomShow = true"
         @mouseleave="zoomShow = false">

      <img :src="currentImage" x-ref="mainImg">

      <div class="zoom-lens"
           x-show="zoomShow"
           x-ref="lens"></div>
    </div>

    <!-- 元のまま -->
    <div class="thumbs">
      <template x-for="img in selected.images">
        <img :src="img"
             :class="{active: currentImage === img}"
             @click="currentImage = img">
      </template>
    </div>

    <div class="date">
      #<span x-text="selected.id"></span>
      <span x-text="selected.prefecture"></span>
      <span x-text="selected.location"></span>
    </div>

    <div>
      <span class="meta" x-text="selected.tag"></span><br>
      <span class="date" x-text="selected.date"></span>
    </div>

    <p x-text="selected.note"></p>

  </div>
</div>

<script>
function stonesApp() {
  return {
    stones: DATA,
    selectedPrefs: [],
    selectedTags: [],
    selected: null,
    currentImage: '',
    zoomShow: false,

    prefectures() {
      return [...new Set(this.stones.map(s => s.prefecture))].sort()
    },

    tags() {
      return [...new Set(
        this.stones.flatMap(s =>
          s.tag.split(',').map(t => t.trim())
        )
      )].sort()
    },

    togglePref(pref) {
      this.selectedPrefs.includes(pref)
        ? this.selectedPrefs = this.selectedPrefs.filter(p => p !== pref)
        : this.selectedPrefs.push(pref)
    },

    toggleTag(tag) {
      this.selectedTags.includes(tag)
        ? this.selectedTags = this.selectedTags.filter(t => t !== tag)
        : this.selectedTags.push(tag)
    },

    filtered() {
      return this.stones
        .filter(s => {
          const matchPref =
            this.selectedPrefs.length === 0 ||
            this.selectedPrefs.includes(s.prefecture)

          const stoneTags = s.tag.split(',').map(t => t.trim())

          //and検索
          //const matchTags =
          //  this.selectedTags.length === 0 ||
          //  this.selectedTags.every(t => stoneTags.includes(t))

          //or検索
          const matchTags =
            this.selectedTags.length === 0 ||
            this.selectedTags.some(t => stoneTags.includes(t))

          return matchPref && matchTags
        })
        .sort((a, b) => b.date.localeCompare(a.date))
    },

    open(stone) {
      this.selected = stone
      this.currentImage = stone.images[0]
    },

    zoomMove(e) {
      const img = this.$refs.mainImg
      const lens = this.$refs.lens
      if (!img || !lens) return

      const rect = img.getBoundingClientRect()
      const x = e.clientX - rect.left
      const y = e.clientY - rect.top

      const lensSize = 200
      const zoom = 3

      lens.style.display = 'block'
      lens.style.left = (x - lensSize/2) + 'px'
      lens.style.top = (y - lensSize/2) + 'px'

      lens.style.backgroundImage = `url(${this.currentImage})`
      lens.style.backgroundSize = `${img.width * zoom}px ${img.height * zoom}px`

      lens.style.backgroundPosition =
        `-${x * zoom - lensSize/2}px -${y * zoom - lensSize/2}px`
    }
  }
}
