<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>石図鑑（ローカル版）</title>

<script src="https://unpkg.com/alpinejs" defer></script>

<style>
  body {
    font-family: sans-serif;
    padding: 12px;
    background:#f7f7f7;
    font-size: 16px;
  }

  h1 {
    margin-bottom: 12px;
    font-size: 20px;
  }

  .group-title {
    font-size: 14px;
    margin-top: 10px;
    color: #555;
  }

  .btns {
    margin-top: 6px;
  }

  .btn {
    display:inline-block;
    padding:6px 12px;
    margin:4px;
    border-radius:20px;
    border:1px solid #ccc;
    background:#fff;
    cursor:pointer;
    font-size:14px;
  }

  .btn.active {
    background:#333;
    color:#fff;
    border-color:#333;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 10px;
  }

  @media (max-width: 480px) {
    .grid {
      grid-template-columns: 1fr;
    }
  }

  .card {
    background:#fff;
    border-radius:10px;
    padding:10px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
    cursor:pointer;
  }

  img {
    width:100%;
    border-radius:6px;
  }

  .meta {
    font-size:13px;
    color:#666;
  }

  .date {
    font-size:12px;
    color:#999;
  }

  .modal {
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.85);
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .modal-inner {
    background:#fff;
    padding:10px;
    border-radius:10px;
    max-width:95%;
  }

  .modal img {
    max-height:55vh;
    margin:4px;
  }

  .thumbs img {
    width:70px;
    cursor:pointer;
    opacity:0.6;
  }

  .thumbs img.active {
    opacity:1;
    border:2px solid #333;
  }
</style>
</head>

<body x-data="stonesApp()">

<h1>🪨 石図鑑</h1>

<!-- フィルタ -->
<div>

  <!-- 都道府県 -->
  <div class="group-title">都道府県</div>
  <div class="btns">
    <template x-for="pref in prefectures()" :key="pref">
      <span
        class="btn"
        :class="{active: selectedPrefs.includes(pref)}"
        @click="togglePref(pref)"
        x-text="pref">
      </span>
    </template>
  </div>

  <!-- タグ -->
  <div class="group-title">タグ</div>
  <div class="btns">
    <template x-for="tag in tags()" :key="tag">
      <span
        class="btn"
        :class="{active: selectedTags.includes(tag)}"
        @click="toggleTag(tag)"
        x-text="tag">
      </span>
    </template>
  </div>

</div>

<!-- カード -->
<div class="grid">
  <template x-for="stone in filtered()" :key="stone.id">
    <div class="card" @click="open(stone)">
      <img :src="stone.images[0]">

      <div><strong x-text="stone.prefecture"></strong></div>
      <div x-text="stone.location"></div>

      <div class="meta" x-text="stone.tag"></div>
      <div class="date" x-text="stone.date"></div>
    </div>
  </template>
</div>

<!-- モーダル -->
<div class="modal" x-show="selected" @click="selected=null">
  <div class="modal-inner" @click.stop>

    <img :src="currentImage">

    <div class="thumbs">
      <template x-for="img in selected.images">
        <img :src="img"
             :class="{active: currentImage === img}"
             @click="currentImage = img">
      </template>
    </div>

    <p>
      <strong x-text="selected.prefecture"></strong> /
      <span x-text="selected.location"></span>
    </p>

    <p><span class="meta" x-text="selected.tag"></span><br><span class="date" x-text="selected.date"></span></p>
    <p x-text="selected.note"></p>

  </div>
</div>

<!-- データ -->
<script>
const DATA = [
  {

    prefecture: "静岡県",
    location: "富士川",
    tag: "頁岩,黄鉄鉱",
    note: "",
    date: "2026-05-05"
  },
  {
    id: "002",
    images: ["img/002_1.jpg", "img/002_2.jpg"],
    prefecture: "静岡県",
    location: "富士川",
    tag: "変成岩,緑色片岩",
    note: "磨くと鏡面に",

  },
  {
    id: "003",

    prefecture: "千葉県",

  },
  {

  },
  {

  },
]

<!-- ロジック -->
<script>
function stonesApp() {
  return {
    stones: DATA,
    selectedPrefs: [],
    selectedTags: [],
    selected: null,
    currentImage: '',

    prefectures() {
      return [...new Set(this.stones.map(s => s.prefecture))].sort()
    },

    tags() {
      return [...new Set(
        this.stones.flatMap(s =>
          s.tag.split(',').map(t => t.trim())
        )
      )].sort()
    },

    togglePref(pref) {
      if (this.selectedPrefs.includes(pref)) {
        this.selectedPrefs = this.selectedPrefs.filter(p => p !== pref)
      } else {
        this.selectedPrefs.push(pref)
      }
    },

    toggleTag(tag) {
      if (this.selectedTags.includes(tag)) {
        this.selectedTags = this.selectedTags.filter(t => t !== tag)
      } else {
        this.selectedTags.push(tag)
      }
    },

    filtered() {
      return this.stones
        .filter(s => {
          const matchPref =
            this.selectedPrefs.length === 0 ||
            this.selectedPrefs.includes(s.prefecture)

          const stoneTags = s.tag.split(',').map(t => t.trim())

          const matchTags =
            this.selectedTags.length === 0 ||
            this.selectedTags.every(t => stoneTags.includes(t))

          return matchPref && matchTags
        })
        .sort((a, b) => b.date.localeCompare(a.date))
    },

    open(stone) {
      this.selected = stone
      this.currentImage = stone.images[0]
    }
  }
}
</script>

</body>
</html>
